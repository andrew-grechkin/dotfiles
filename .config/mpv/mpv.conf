# man: mpv

input-ipc-server=/tmp/mpvsocket

# Use GPU-accelerated video output by default
vo=gpu
hwdec=auto

alang=en,nl,ru
slang=en,nl,ru
vlang=en,nl,ru
audio-fallback-to-null=yes
audio-file-auto=fuzzy
cursor-autohide-fs-only
load-scripts=yes
osd-duration=5000
save-position-on-quit
sub-auto=fuzzy
volume=50
watch-later-directory=~/.cache/mpv
ontop=yes
on-all-workspaces
geometry=25%-+20-+30

osd-bar-align-y=1
osd-bar-h=1
osd-bar-w=90

screenshot-directory=~/pictures

cache=yes
demuxer-max-bytes=999M
demuxer-max-back-bytes=333M

# yt-dlp support
# ytdl-raw-options=format-sort="codec:av1,+res:1080"
ytdl-raw-options=format="b",format-sort="+res:1080"
# ytdl-raw-options=format-sort="+res:1080"
