---
env:
  browser: true
  es2021: true
extends:
  - eslint:recommended
  - plugin:vue/vue3-recommended
  - plugin:vue-scoped-css/vue3-recommended
parserOptions:
  ecmaVersion: 12
  sourceType: module
plugins:
  - html
  - vue
  - align-assignments
rules:
  align-assignments/align-assignments:
    - 2
    - requiresOnly: false
  comma-dangle:
    - error
    - always-multiline
  comma-spacing:
    - error
    - after: true
      before: false
  comma-style:
    - error
    - last
  computed-property-spacing:
    - error
    - never
  curly:
    - error
    - multi-or-nest
    - consistent
  dot-location:
    - error
    - property
  dot-notation:
    - error
  eqeqeq:
    - error
  func-call-spacing:
    - error
    - never
  indent:
    - error
    - 4
  key-spacing:
    - error
    - align: value
      mode: minimum
  linebreak-style:
    - error
    - unix
  no-floating-decimal:
    - error
  no-implicit-coercion:
    - error
  no-invalid-this:
    - error
  no-unused-vars:
    - error
    - vars: local
      varsIgnorePattern: app
  no-useless-return:
    - error
  quotes:
    - error
    - single
  semi:
    - error
    - always
  spaced-comment:
    - error
    - always
  vue/component-definition-name-casing:
    - warn
    - kebab-case
  vue/html-indent:
    - error
    - 4
settings:
  html/html-extensions:
    - .html
    - .html.ep
