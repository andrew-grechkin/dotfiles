# vim: filetype=conf foldmethod=marker

# => defaults ----------------------------------------------------------------------------------------------------- {{{1

EDITOR=vim
PAGER=less
VISUAL=vim

# => xdg ---------------------------------------------------------------------------------------------------------- {{{1

XDG_CACHE_HOME="${HOME}/.cache"
XDG_CONFIG_HOME="${HOME}/.config"
XDG_DATA_HOME="${HOME}/.local/share"
XDG_STATE_HOME="${HOME}/.local/state"

# => shell -------------------------------------------------------------------------------------------------------- {{{1

ZDOTDIR="${XDG_CONFIG_HOME}/zsh"
FUSE3_P7ZIP_FORMATS="Iso:Udf:*:APM:GPT"

# => wine --------------------------------------------------------------------------------------------------------- {{{1

WINEPREFIX="${XDG_CACHE_HOME}/wine/default-x32"
WINEARCH=win32

# => X11 settings ------------------------------------------------------------------------------------------------- {{{1

#XINITRC="${XDG_CONFIG_HOME}/.config/x11/xinitrc"
#XSERVERRC="${XDG_CONFIG_HOME}/x11/xserverrc"

### this might break lightdm (and xrdp)
#XAUTHORITY="${XDG_RUNTIME_DIR}/Xauthority"
#ICEAUTHORITY="${XDG_RUNTIME_DIR}/ICEauthority"

# => does not work ------------------------------------------------------------------------------------------------ {{{1

# GTK_RC_FILES="${XDG_CONFIG_HOME}/x11/gtk1rc"
# GTK2_RC_FILES="${XDG_CONFIG_HOME}/x11/gtk2rc"
# ERRFILE="${XDG_CACHE_HOME}/x11/xsession-errors"

# => kde ---------------------------------------------------------------------------------------------------------- {{{1

KDEHOME="${XDG_CONFIG_HOME}/kde"

# => misc --------------------------------------------------------------------------------------------------------- {{{1

ANSIBLE_HOME="${XDG_CONFIG_HOME}/ansible"
GROFF_TMPDIR="/tmp"
PARALLEL_HOME="${XDG_CONFIG_HOME}/parallel"
PYTHON_KEYRING_BACKEND="keyring.backends.null.Keyring"
RIPGREP_CONFIG_PATH="${XDG_CONFIG_HOME}/ripgreprc"
USRTMP="${HOME}/.local/no-cow/tmp"
VAGRANT_DOTFILE_PATH="${XDG_DATA_HOME}/vagrant"
