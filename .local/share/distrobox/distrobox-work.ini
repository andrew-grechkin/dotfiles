[arch]
additional_packages=ansible base base-devel reflector vim tmux zsh xsel
image=quay.io/toolbx-images/archlinux-toolbox:latest
pull=true
start_now=true
pre_init_hooks=umount /etc/resolv.conf && cp /home/agrechkin/git/private/dotfiles/.local/share/distrobox/resolv.conf /etc/resolv.conf;
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/docker-credential-iam;
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/docker;
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/flatpak;
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/podman;
init_hooks=ln -sf /usr/bin/distrobox-host-exec /usr/local/bin/xdg-open;
